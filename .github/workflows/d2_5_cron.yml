name: D2.5 Cron Wrappers

on:
  workflow_dispatch:
  schedule:
    - cron: "*/5 * * * *"

jobs:
  social_reminders:
    name: Run social reminders wrapper
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Call /api/cron/social-reminders
        shell: bash
        run: |
          set -euo pipefail
          url="${{ secrets.D2_5_BASE_URL }}/api/cron/social-reminders"
          body_file="/tmp/body_social_reminders.txt"
          for attempt in 1 2; do
            code="$(curl -sS -o "${body_file}" -w "%{http_code}" \
              -H "x-cron-secret: ${{ secrets.D2_5_CRON_SECRET }}" \
              "${url}" || true)"
            echo "HTTP=${code} url=${url} attempt=${attempt}"
            echo "BODY_PREVIEW:"
            head -c 400 "${body_file}" || true
            echo
            if [ "${code}" = "200" ]; then
              exit 0
            fi
            if [ "${attempt}" = "1" ]; then
              echo "Retrying in 3s..."
              sleep 3
            fi
          done
          exit 1

  signals_run:
    name: Run signals wrapper
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Call /api/cron/signals-run
        shell: bash
        run: |
          set -euo pipefail
          url="${{ secrets.D2_5_BASE_URL }}/api/cron/signals-run"
          body_file="/tmp/body_signals_run.txt"
          for attempt in 1 2; do
            code="$(curl -sS -o "${body_file}" -w "%{http_code}" \
              -H "x-cron-secret: ${{ secrets.D2_5_CRON_SECRET }}" \
              "${url}" || true)"
            echo "HTTP=${code} url=${url} attempt=${attempt}"
            echo "BODY_PREVIEW:"
            head -c 400 "${body_file}" || true
            echo
            if [ "${code}" = "200" ]; then
              exit 0
            fi
            if [ "${attempt}" = "1" ]; then
              echo "Retrying in 3s..."
              sleep 3
            fi
          done
          exit 1
